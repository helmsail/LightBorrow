# Docker 本地开发配置（PostgreSQL + Redis 全部通过 Docker 运行）
# 企业级标准：所有基础服务使用 Docker，本地开发零模拟
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lightborrow
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: lightborrow
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

