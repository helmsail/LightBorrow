# Docker 本地开发配置（PostgreSQL + Redis 全部通过 Docker 运行）
# 企业级标准：所有基础服务使用 Docker，本地开发零模拟
# 注意：API Key 通过环境变量注入，参考 .env.example
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lightborrow
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: ${PG_PASSWORD:lightborrow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 5000
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379

# Embedding 使用阿里云百炼（BGE-M3 模型）
ai:
  embedding:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${EMBEDDING_API_KEY:}
