# 无 Docker 本地开发配置（H2 内存数据库 + 本地限流）
# 适用于没有 Docker 环境时快速启动后端
spring:
  main:
    allow-circular-references: true
  datasource:
    url: jdbc:h2:mem:lightborrow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console

# AI 配置
ai:
  llm:
    base-url: https://api.deepseek.com
    api-key: ***REMOVED***
    model: deepseek-v4-flash
  embedding:
    base-url: https://ws-zdcu16di9b598nny.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
    api-key: ***REMOVED***
    model: text-embedding-v3
  vector:
    enabled: false
    dimension: 1024
    table-name: vector_documents
