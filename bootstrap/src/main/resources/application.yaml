spring:
  application:
    name: lightborrow

  # 优雅关闭（收到 SIGTERM 后不再接受新请求，等待处理中的请求完成）
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

# 日志
logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n'
  level:
    root: info
    com.helmsail: info

# Actuator / 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true  # 启用 K8s 就绪/存活探针
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: @project.version@

# ============================================================================
# AI 通用配置（所有 profile 共享，API Key 从环境变量读取）
#   LLM：DeepSeek
#   Embedding：由各 profile 自行配置（DeepSeek 不支持 Embedding API）
#   各 profile 可覆盖 model / base-url 等差异项
#
#   Docker 内部运行时，docker-compose.yml 通过 SPRING_ 环境变量覆盖数据源配置
# ============================================================================
ai:
  llm:
    base-url: https://api.deepseek.com
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-chat
  vector:
    enabled: false
    table-name: vector_documents
