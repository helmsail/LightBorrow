# ============================================================================
# LightBorrow 全栈本地开发环境
# 一条命令启动全部服务：docker compose up -d
# ============================================================================
services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: lightborrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lightborrow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lightborrow}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存与状态存储
  redis:
    image: redis:7-alpine
    container_name: lightborrow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用服务（含前端静态资源）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lightborrow-app
    ports:
      - "3000:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      # Docker 内部使用服务名访问，而非 localhost
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/lightborrow
      - SPRING_DATA_REDIS_HOST=redis
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?请设置 DEEPSEEK_API_KEY 环境变量}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
